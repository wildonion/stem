[package]
name = "stem"
version = "0.1.0"
authors = ["wildonion <abarmardeatashyne@gmail.com>"]
edition = "2021"



[dependencies]
lazy_static = "1"
tokio = { version = "1", features = ["full"] }
serde = {version = "1", features = ["derive"] }
actix-redis = "0.12.0"
actix = "0.13.0"
actix-cors = "0.6.4"
actix-web = { version = "4", features = ["openssl"] }
actix-web-actors = "4.2.0"
futures-util = "0.3"
rayon = "1"
serde_json = "1"
uuid = { version = "1", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
dotenv = "0.15"
pretty_env_logger = "0.4.0"
log4rs = "1.2.0"
tokio-cron-scheduler = "0.9.1"
env_logger = "0.10.0"
bytes = { version = "1", features = ["serde"] }
hex = "0.4"
rand = "0.8"
once_cell = "1.17.1"
sysinfo = "0.28.4"
wasmer = "4"
wasmer-wasi = "3.1.1"
bindgen = "0.66.1"
clap = "4.4.2"
wallexerr = "0.3.0"

[lib]
name = "daemon"
path = "src/lib.rs"


[[bin]]
name = "stem"
path = "src/brain.rs"
