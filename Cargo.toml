[package]
name = "stem"
version = "0.1.0"
authors = ["wildonion <abarmardeatashyne@gmail.com>"]
edition = "2021"



[dependencies]
tokio = { version = "1", features = ["full"] }
riker = "0.4.1"
riker-patterns = "0.4.2"
serde = {version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "0.8", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
dotenv = "0.15"
env_logger = "0.8"
hex = "0.4"
futures = "0.3"
rayon = "1"
wasmer = "3.1.0"
borsh = "0.10"
async-std = "1.12.0"
futures-util = "0.3"
pretty_env_logger = "0.4"
bytes = { version = "1", features = ["serde"] }
rand = "0.8"
rand_chacha = "0.3.1"
rust-argon2 = "1"
rust-crypto = "0.2.36"
ring = "0.16.20"
sha2 = "0.10.6"
lazy_static = "1"
async-trait = "0.1.64"
once_cell = "1.17.1"
sysinfo = "0.28.4"
tokio-cron-scheduler = "0.9.4"


[lib]
name = "daemon"
path = "src/lib.rs"


[[bin]]
name = "stem"
path = "src/brain.rs"
